<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI COSMOS 3D Universe Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <h1>OMNI COSMOS 3D Universe Simulator</h1>
    <div id="container"></div>
    <script>
        // Basic setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);

        // Adding celestial objects (stars, galaxies, cosmic web)
        function createStar() {
            const geometry = new THREE.SphereGeometry(0.1, 24, 24);
            const material = new THREE.MeshBasicMaterial({color: 0xffffff});
            const star = new THREE.Mesh(geometry, material);
            star.position.x = (Math.random() - 0.5) * 2000;
            star.position.y = (Math.random() - 0.5) * 2000;
            star.position.z = (Math.random() - 0.5) * 2000;
            scene.add(star);
        }

        for (let i = 0; i < 1000; i++) {
            createStar();
        }

        camera.position.z = 5;

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>

    <style>
        body { margin: 0; }
        #container { width: 100%; height: 100vh; }
    </style>
</body>
</html>
