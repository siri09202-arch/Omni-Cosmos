<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI COSMOS 3D Universe Simulator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to OMNI COSMOS 3D Universe Simulator</h1>
    </header>
    <main>
        <section id="simulation">
            <canvas id="universeCanvas"></canvas>
        </section>
        <section id="controls">
            <h2>Controls</h2>
            <button id="startSimulation">Start Simulation</button>
            <button id="stopSimulation">Stop Simulation</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 OMNI COSMOS Team</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
